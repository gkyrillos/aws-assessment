name: aws-assessment destroy

on:
  workflow_dispatch: # This creates the manual trigger button

permissions:
  id-token: write
  contents: read

env:
  AWS_ROLE_ARN: arn:aws:iam::566866004670:role/GitHubActionsRole

jobs:
  destroy-compute-and-data:
    name: Destroy compute and data (${{ matrix.region }})
    runs-on: ubuntu-latest
    # environment: production # Requires your "Approve" click before starting
    strategy:
      fail-fast: false # Ensure both regions try to destroy even if one fails
      matrix:
        region: [us-east-1, eu-west-1]
    defaults:
      run:
        working-directory: ./root_modules/compute-and-data
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="key=compute-and-data-${{ matrix.region }}.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="bucket=terraform-state-gkyrillos"
      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
        env:
          TF_VAR_region: ${{ matrix.region }}
  destroy-auth:
    name: Amazon Cognito Auth (us-east-1)
    needs: destroy-compute-and-data # Wait for APIs to be gone first
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ./root_modules/auth
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="key=auth.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="bucket=terraform-state-gkyrillos"
      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
